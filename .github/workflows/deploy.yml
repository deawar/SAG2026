name: Build & Deploy Docker Image

on:
  push:
    branches: [ main, develop ]
    tags: ['v*']
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    outputs:
      image-tag: ${{ steps.build.outputs.imageid }}
      image-digest: ${{ steps.build.outputs.digest }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/sag2026
            ghcr.io/${{ github.repository_owner }}/sag2026
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sag2026:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sag2026:buildcache,mode=max

      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  scan:
    name: Scan Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: github.event_name != 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Login to Docker registries for scanning
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/sag2026:${{ github.ref_name }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true  # advisory scan — an upload hiccup must not fail the deploy
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Grype vulnerability scan
        uses: anchore/scan-action@64a33b277ea7a1215a3c142735a1091341939ff5 # v4
        id: grype
        with:
          image: ghcr.io/${{ github.repository_owner }}/sag2026:${{ github.ref_name }}
          fail-build: false
        continue-on-error: true

      - name: Upload Grype results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && steps.grype.outputs.sarif != ''
        continue-on-error: true  # advisory scan — a stale Grype DB / empty SARIF must not fail the deploy
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Deploy to staging environment
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ${{ secrets.STAGING_APP_DIR }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            sleep 10
            docker compose -f docker-compose.prod.yml exec -T app npm run test:smoke || true
        continue-on-error: false

      - name: Run smoke tests
        run: |
          echo "Running smoke tests on staging..."
          curl -f http://${{ secrets.STAGING_HOST }}/health || exit 1
        continue-on-error: true

      - name: Slack notification - Staging deployed
        uses: slackapi/slack-github-action@70cd7be8e40a46e8b0eced40b0de447bdb42f68e # v1.26.0
        if: success()
        with:
          payload: |
            {
              "text": "Staging deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Successful*\nRepository: ${{ github.repository }}\nRef: ${{ github.ref }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, scan]
    # Manual/controlled release: production deploys only on a version tag (e.g. v1.2.0),
    # never on routine pushes to main. Push a tag to deploy; otherwise redeploy by hand.
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Backup production database
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ${{ secrets.PROD_APP_DIR }}
            mkdir -p backups
            docker compose -f docker-compose.prod.yml exec -T postgres pg_dump -U ${{ secrets.DATABASE_USER }} ${{ secrets.DATABASE_NAME }} > backups/backup-$(date +%Y%m%d-%H%M%S).sql
            echo "Database backup completed"

      - name: Deploy to production environment
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ${{ secrets.PROD_APP_DIR }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            sleep 15
            if ! curl -f http://localhost/health; then
              echo "Health check failed, rolling back..."
              docker compose -f docker-compose.prod.yml down
              docker compose -f docker-compose.prod.yml pull
              docker pull ${{ secrets.DOCKER_USERNAME }}/sag2026:latest
              docker compose -f docker-compose.prod.yml up -d
              exit 1
            fi
            echo "Production deployment successful"

      - name: Run production smoke tests
        run: |
          echo "Running smoke tests on production..."
          curl -f http://${{ secrets.PROD_HOST }}/health || exit 1
          curl -f http://${{ secrets.PROD_HOST }}/api/auctions || exit 1
        continue-on-error: true

      - name: Create GitHub release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_id }}
          release_name: Production Release - ${{ github.run_id }}
          body: |
            Production deployment from ${{ github.ref }}
            Deployed by: ${{ github.actor }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
        continue-on-error: true

      - name: Slack notification - Production deployed
        uses: slackapi/slack-github-action@70cd7be8e40a46e8b0eced40b0de447bdb42f68e # v1.26.0
        if: success()
        with:
          payload: |
            {
              "text": "Production deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Successful*\nRepository: ${{ github.repository }}\nRef: ${{ github.ref }}\nAuthor: ${{ github.actor }}\nVersion: ${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Slack notification - Deployment failed
        uses: slackapi/slack-github-action@70cd7be8e40a46e8b0eced40b0de447bdb42f68e # v1.26.0
        if: failure()
        with:
          payload: |
            {
              "text": "Production deployment FAILED",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment FAILED*\nRepository: ${{ github.repository }}\nRef: ${{ github.ref }}\nAuthor: ${{ github.actor }}\nCheck logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

# ============================================================================
# This workflow builds and deploys Docker images
# Builds for multiple platforms (amd64, arm64)
# Scans images for vulnerabilities
# Auto-deploys to staging (develop branch) and production (main branch)
# Includes automatic rollback on health check failure
# Sends Slack notifications
# ============================================================================
