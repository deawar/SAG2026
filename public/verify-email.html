<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Verify your email address">
    <title>Verify Email - Silent Auction Gallery</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">

    <style>
        .verify-box {
            max-width: 480px;
            margin: 4rem auto;
            text-align: center;
            background: var(--color-surface, #fff);
            border: 1px solid var(--color-border, #e2e2e2);
            border-radius: 8px;
            padding: 3rem 2rem;
        }
        .verify-icon { font-size: 3rem; margin-bottom: 1rem; }
        .verify-box h1 { margin-bottom: 0.75rem; }
        .verify-box p { color: var(--color-text-muted, #666); }
        .verify-actions { margin-top: 2rem; }
        #status-msg { margin-top: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-to-main">Skip to main content</a>

    <header class="navbar" role="banner">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="/" class="logo" aria-label="Silent Auction Gallery Home">
                    <img src="/images/logo/SAGLive.png" alt="Silent Auction Gallery Logo" class="logo-img">
                    <span class="logo-text">SAG</span>
                </a>
            </div>
        </div>
    </header>

    <main id="main-content" class="main-content">
        <div class="container">
            <div class="verify-box" id="verify-box">
                <div class="verify-icon" aria-hidden="true" id="verify-icon">⏳</div>
                <h1 id="verify-title">Verifying your email…</h1>
                <p id="verify-body">Please wait a moment.</p>
                <div class="verify-actions" id="verify-actions" style="display:none;"></div>
            </div>
        </div>
    </main>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const uid   = params.get('uid');
            const token = params.get('token');

            const iconEl    = document.getElementById('verify-icon');
            const titleEl   = document.getElementById('verify-title');
            const bodyEl    = document.getElementById('verify-body');
            const actionsEl = document.getElementById('verify-actions');

            function setSuccess() {
                iconEl.textContent  = '✓';
                titleEl.textContent = 'Email Verified!';
                bodyEl.textContent  = 'Your account is now active. You can log in.';
                actionsEl.innerHTML = '<a href="/login.html" class="btn btn-primary">Log In</a>';
                actionsEl.style.display = 'block';
            }

            function setError(msg) {
                iconEl.textContent  = '✗';
                titleEl.textContent = 'Verification Failed';
                bodyEl.textContent  = msg || 'This link is invalid or has expired. Please request a new one.';
                actionsEl.innerHTML = '<a href="/login.html" class="btn btn-secondary">Back to Login</a>';
                actionsEl.style.display = 'block';
            }

            if (!uid || !token) {
                setError('Missing verification parameters.');
                return;
            }

            fetch(`/api/auth/verify-email?uid=${encodeURIComponent(uid)}&token=${encodeURIComponent(token)}`)
                .then(res => res.json().then(data => ({ ok: res.ok, data })))
                .then(({ ok, data }) => {
                    if (ok && data.ok) { setSuccess(); }
                    else { setError(data.message); }
                })
                .catch(() => setError('Network error. Please try again.'));
        }());
    </script>
</body>
</html>
