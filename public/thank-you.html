<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Payment confirmed — thank you for your purchase">
    <title>Thank You - Silent Auction Gallery</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/accessibility.css">

    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">

    <style>
        .thank-you-box {
            max-width: 540px;
            margin: 4rem auto;
            text-align: center;
            background: var(--color-surface, #fff);
            border: 1px solid var(--color-border, #e2e2e2);
            border-radius: 8px;
            padding: 3rem 2rem;
        }
        .thank-you-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
        .thank-you-box h1 {
            margin-bottom: 0.75rem;
        }
        .thank-you-box p {
            color: var(--color-text-muted, #666);
            margin-bottom: 0.5rem;
        }
        .thank-you-actions {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        #transaction-id {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--color-text-muted, #888);
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-to-main">Skip to main content</a>

    <header class="navbar" role="banner">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="/" class="logo" aria-label="Silent Auction Gallery Home">
                    <img src="/images/logo/SAGLive.png" alt="Silent Auction Gallery Logo" class="logo-img">
                    <span class="logo-text">SAG</span>
                </a>
            </div>
            <nav class="navbar-nav" role="navigation" aria-label="Main Navigation">
                <ul class="nav-list">
                    <li><a href="/auctions.html" class="nav-link">Auctions</a></li>
                    <li><a href="/" class="nav-link">Home</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main-content" class="main-content">
        <div class="container">
            <div class="thank-you-box">
                <div class="thank-you-icon" aria-hidden="true">✓</div>
                <h1>Payment Confirmed!</h1>
                <p>Thank you for your purchase. Your payment has been received.</p>
                <p>You will receive a confirmation email shortly.</p>
                <p id="transaction-id"></p>
                <div class="thank-you-actions">
                    <a href="/user-dashboard.html" class="btn btn-primary">Back to Dashboard</a>
                    <a href="/auctions.html" class="btn btn-secondary">Browse Auctions</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer" role="contentinfo">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Silent Auction Gallery. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const txId = params.get('transactionId');
            if (txId) {
                const el = document.getElementById('transaction-id');
                if (el) { el.textContent = 'Transaction ID: ' + txId; }
            }
        }());
    </script>
</body>
</html>
