<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#243460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0d080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a07828;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="canvas" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ede5d0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="260" fill="url(#bg)" />

  <!-- Outer frame border -->
  <rect x="20" y="16" width="360" height="228" rx="4" fill="url(#frame)" />

  <!-- Inner frame shadow -->
  <rect x="28" y="24" width="344" height="212" rx="2" fill="#6b4c10" opacity="0.4" />

  <!-- Canvas -->
  <rect x="30" y="26" width="340" height="208" rx="2" fill="url(#canvas)" />

  <!-- Abstract art elements on canvas -->
  <!-- Sky/wash area -->
  <rect x="30" y="26" width="340" height="90" rx="2" fill="#dce8f5" opacity="0.6" />

  <!-- Sun/circle -->
  <circle cx="310" cy="72" r="28" fill="#f5c842" opacity="0.75" />
  <circle cx="310" cy="72" r="20" fill="#f0d878" opacity="0.5" />

  <!-- Rolling hills -->
  <ellipse cx="100" cy="200" rx="120" ry="60" fill="#4a7c3f" opacity="0.7" />
  <ellipse cx="280" cy="210" rx="140" ry="55" fill="#3d6b34" opacity="0.65" />
  <ellipse cx="200" cy="220" rx="100" ry="45" fill="#5a8f4e" opacity="0.6" />

  <!-- Tree silhouette -->
  <rect x="168" y="140" width="8" height="50" fill="#2c4a1e" opacity="0.8" />
  <ellipse cx="172" cy="130" rx="22" ry="28" fill="#2c5c20" opacity="0.8" />
  <ellipse cx="172" cy="118" rx="16" ry="20" fill="#3a7228" opacity="0.75" />

  <!-- Palette icon — bottom center -->
  <g transform="translate(171, 170)">
    <!-- Palette body -->
    <ellipse cx="14" cy="12" rx="16" ry="13" fill="#c9a84c" opacity="0.9" />
    <ellipse cx="14" cy="12" rx="12" ry="9" fill="#f5f0e8" opacity="0.95" />
    <!-- Thumb hole -->
    <ellipse cx="22" cy="19" rx="4" ry="3" fill="#c9a84c" opacity="0.9" />
    <!-- Color dots on palette -->
    <circle cx="8"  cy="7"  r="2.5" fill="#e03030" />
    <circle cx="14" cy="5"  r="2.5" fill="#e8a020" />
    <circle cx="20" cy="7"  r="2.5" fill="#30a030" />
    <circle cx="23" cy="13" r="2.5" fill="#2060c8" />
    <circle cx="6"  cy="13" r="2.5" fill="#a030a0" />
    <!-- Brush -->
    <line x1="24" y1="2" x2="8" y2="22" stroke="#6b4c10" stroke-width="2" stroke-linecap="round" />
    <rect x="5" y="20" width="6" height="8" rx="1" fill="#a07828" transform="rotate(-45 8 24)" />
  </g>

  <!-- Label -->
  <rect x="80" y="220" width="240" height="22" rx="11" fill="#1a2744" opacity="0.6" />
  <text x="200" y="235" font-family="Georgia, 'Times New Roman', serif" font-size="11"
        fill="#f0d080" text-anchor="middle" letter-spacing="1.5">ARTWORK PREVIEW</text>
</svg>
